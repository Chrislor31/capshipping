{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>


    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/dashboard/dashboard.css' %}">

    <link rel="stylesheet" href="{% static 'css/dashboard/dashboard_responsive.css' %}">

    <title>Dashboard</title>
</head>
<body>


<!-- 🔥 DELETE CONFIRM MODAL -->
<div id="deleteModal" class="modal_overlay hidden">
    <div class="modal_box">

        <div class="modal_header">
            <i class='bx bx-error-circle'></i>
            <h3>Confirm Delete</h3>
        </div>

        <div class="modal_body">
            <p id="deleteMessage">
                Are you sure you want to delete this item?
            </p>
            <small>This action cannot be undone.</small>
        </div>

        <div class="modal_footer">
            <button id="cancelDelete" class="btn_cancel">Cancel</button>
            <button id="confirmDelete" class="btn_delete">Delete</button>
        </div>

    </div>
</div>

<header class="header">

    <!-- SIDEBAR -->
    <div class="side_lift">
        {% include 'dashboard/sidebar.html' %}
    </div>

    <!-- MAIN CONTENT -->
    <div class="main_content">

        <!-- TOPBAR -->
        {% include 'dashboard/topbar.html' %}

        <!-- 🔥 DYNAMIC CONTENT (SPA ZONE) -->
        <div id="main-content">

        </div>

    </div>

</header>

<!-- JS -->


<script src="{% static 'js/dashboard/dashboard.js' %}"></script>
<script src="{% static 'js/dashboard/shipment-manager.js' %}"></script>
<script src="{% static 'js/dashboard/add_users.js' %}"></script>


<script>
document.addEventListener("click", function(e) {

    // =====================
    // 🔥 SIDEBAR
    // =====================
    const sidebar = document.querySelector(".side_lift");

    if (sidebar) {

        // OPEN
        if (e.target.closest("#menuBtn")) {
            sidebar.classList.add("active");
            return;
        }

        // CLOSE BUTTON
        if (e.target.closest("#closeMenu")) {
            sidebar.classList.remove("active");
            return;
        }

        // 🔥 CLICK SOU ITEM → FÈMEN
        if (e.target.closest(".side_lift .nav-item") || e.target.closest(".side_lift a")) {
            sidebar.classList.remove("active");
            return;
        }

        // 🔥 CLICK DEYO SIDEBAR → FÈMEN
        if (!e.target.closest(".side_lift")) {
            sidebar.classList.remove("active");
        }
    }

    // =====================
    // 🔥 LOGOUT
    // =====================
    const logoutBtn = e.target.closest("#logoutBtn");
    if (logoutBtn) {
        const url = logoutBtn.dataset.url;
        window.location.href = url;
        return;
    }

    // =====================
    // 🔥 USER DROPDOWN
    // =====================
    const dropdown = document.getElementById("userDropdown");

    if (dropdown) {

        // TOGGLE
        if (e.target.closest("#userToggle")) {
            dropdown.classList.toggle("active");
            return;
        }

        // CLICK DEYO → FÈMEN
        if (!e.target.closest("#userDropdown")) {
            dropdown.classList.remove("active");
        }
    }

});
// =====================
// 🔥 USER DROPDOWN INIT
// =====================
function initUserDropdown(){

    const toggle = document.getElementById("userToggle");
    const dropdown = document.getElementById("userDropdown");

    if (!toggle || !dropdown) return;

    // 🔥 evite double event
    if (toggle.dataset.init) return;
    toggle.dataset.init = "true";

    console.log("✅ USER DROPDOWN INIT");

    toggle.addEventListener("click", function(e){
        e.stopPropagation();
        dropdown.classList.toggle("active");
    });
}


// =====================
// 🔥 INIT ON LOAD (SPA SAFE)
// =====================
window.addEventListener("load", function () {
    initUserDropdown();
});
</script>


<script>

    document.addEventListener("click", function(e){

    const btn = e.target.closest("[data-print-url]");

    if (btn){

        const url = btn.dataset.printUrl;

        console.log("🖨️ printing:", url);

        // 🔥 open popup
        const printWindow = window.open(url, "_blank");

        // 🔥 auto print
        printWindow.onload = function(){
            printWindow.print();
        };
    }

});
</script>
</body>








</html>
