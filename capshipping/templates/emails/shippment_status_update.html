<!DOCTYPE html>

<html>
<body style="margin:0; padding:0; background:#f4f7fb; font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="padding:5px;">
    <tr>
    <td align="center">

        <!-- MAIN BOX -->
        <table width="100%" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:12px; overflow:hidden; border-bottom: 5px solid orange; max-width:800px;">

            <!-- HEADER -->
            <tr>
                <td style="padding:25px; text-align:center; background:#ffffff;">
                    <img src="https://res.cloudinary.com/dplskdeel/image/upload/f_auto,q_auto/cap-shipping-blu-color_dmulkq" alt="Logo" style="margin-bottom:10px; width:160px;">
                    <hr style="width:100%; border:0.5px solid #dbdbdb;">
                </td>
            </tr>

            <!-- 🔥 STATUS IMAGE -->
            <tr>
                <td style="text-align:center; padding-top:10px;">
                    <img src="{{ image_url }}" alt="status" style="width:70px;">
                </td>
            </tr>

            <!-- BODY -->
            <tr>
                <td style="padding:30px 25px; text-align:center;">

                    <!-- TITLE -->
                    <p style="color:#1f2937; font-size:20px; margin-bottom:10px; font-weight:bold;">
                        {{ title }}
                    </p>

                    <!-- MESSAGE -->
                    <p style="color:#21385E; font-size:15px; margin-bottom:15px; line-height:1.5;">
                        {{ message }}
                    </p>

                    <!-- TRACKING -->
                    <p style="color:#6b7280; font-size:14px;">
                        <strong>Tracking Number:</strong> {{ tracking }}
                    </p>

                    <!-- LOCATION -->
                    <p style="color:#6b7280; font-size:14px;">
                        <strong>Location:</strong> {{ location }}
                    </p>

                    <!-- PICKUP CODE -->
                    {% if pickup_code %}
                    <p style="margin-top:15px; font-size:16px; color:#000;">
                        <strong>Your Pickup Code:</strong><br>
                        <span style="font-size:22px; font-weight:bold; color:#DE8333;">
                            {{ pickup_code }}
                        </span>
                    </p>
                    {% endif %}

                </td>
            </tr>

            <!-- FOOTER -->
            <tr>
                <td style="background:#ddd3b53c; padding:25px; text-align:center;">

                    <p style="margin:10px 0; font-size:14px; color:#1f2937">
                        📞 +1 (609) 289-0277 <br>
                        📧 info@capshippingdistribution.com
                    </p>

                    <div style="text-align:center; margin:15px 0;">
                        <a href="https://www.facebook.com/capshipping" target="_blank">
                            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" style="width:24px;">
                        </a>
                        <a href="https://www.instagram.com/capshipping" target="_blank">
                            <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" style="width:24px;">
                        </a>
                        <a href="https://www.tiktok.com/@capshipping" target="_blank">
                            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png" style="width:24px;">
                        </a>
                    </div>

                    <hr style="border:none; border-top:1px solid #e5e7eb; margin:20px 0;">

                    <p style="font-size:12px; color:#9ca3af;">
                        © 2026 Cap Shipping Distribution. All rights reserved.
                    </p>

                 </td>
            </tr>

        </table>

    </td>
    </tr>
</table>

</body>
</html>
