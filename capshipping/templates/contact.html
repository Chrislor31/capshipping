{% extends 'base.html' %}

{% load i18n %}
{% load static %}

{% block title %} Contact {% endblock %}

{% block manu_nav %}
	<!-- breadcumb Section-->
	<div class="breadcumb-area">
		<div class="container">
			<div class="row align-items-center">
				<div class="col-lg-12 text-center">
					<div class="breadcumb-content">
						<div class="breadcumb-title">
							<h4>Contact</h4>
						</div>
						<ul>
							<li><a href="{% url 'home' %}">{% trans 'Home' %}</a></li>
							<li>{% trans 'Contact' %}</li>
						</ul>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!--breadcumb Section-->





	<!-- contact section home2 classic-->
	 <section class="contact-section-home2-classic inner">
		<div class="row g-0">
			<div class="col-xl-6">
				<div class="contact-thumb">
					<img src="{% static './images/Cargomages/about_main.png' %}" alt="contact thumb">
					<div class="contact-autor-info">
						<div class="autor-img-box">
							
							<div class="autor-number">5k+</div>
						</div>
						<p class="autor-desc">{% trans 'Trusted Happy Customers' %}</p>
					</div>
				</div>
			</div>
			<div class="col-xl-6">
				<div class="contact-form-box">
					<!-- section title -->
					<div class="sec-title">
						<div class="section-sub-title">
							<h1 class="sub-title"><img src="{% static 'images/main-home/sub-title-icon.png' %}" alt="sub-icon">Consultations</h1>
						</div>
						<div class="section-title">
							<h1 class="title title-anim">{% trans 'Need Help? We’re Here' %}</h1>
						</div>
					</div>
					<form >
						<div class="row">
							<div class="col-lg-6 col-md-6">
								<div class="form-box">
									<input type="text" name="Name" placeholder="Your Name" required="">
									<i class="fa-regular fa-circle-user"></i>
								</div>
							</div>
							<div class="col-lg-6 col-md-6">
								<div class="form-box">
									<input type="text" name="phone" placeholder="Phone No.">
									<i class="fa-solid fa-circle-phone"></i>
								</div>
							</div>
							<div class="col-lg-6 col-md-6">
								<div class="form-box">
									<input type="email" name="email" placeholder="Enter E-Mail">
									<i class="fa-solid fa-envelope"></i>
								</div>
							</div>
							<div class="col-lg-6 col-md-6">
								<div class="form-box">
									<div class="option-box">
										<select class="wide">

    <option value="">
        {% trans 'Select Subject' %}
    </option>

    <option value="shipment_tracking">
        {% trans 'Shipment Tracking' %}
    </option>

    <option value="air_freight">
        {% trans 'Air Freight' %}
    </option>

    <option value="sea_cargo">
        {% trans 'Sea Cargo' %}
    </option>

    <option value="package_delivery">
        {% trans 'Package Delivery' %}
    </option>

    <option value="warehouse_service">
        {% trans 'Warehouse Service' %}
    </option>


    <option value="customer_support">
        {% trans 'Customer Support' %}
    </option>

    <option value="other">
        {% trans 'Other Inquiry' %}
    </option>

</select>
									</div>
								</div>
							</div>
							<div class="col-lg-12 col-md-12">
								<div class="form-box message">
									<textarea name="message" id="message" cols="30" rows="10" placeholder="Write Message..."></textarea>
								</div>
							</div>
							<div class="contact-form">
								<button type="submit">{% trans 'Send Message' %}<i class="fa-solid fa-arrow-right"></i></button>
							</div>
						</div>
					</form>
					<div id="status"></div>
				</div>
			</div>
		</div>
	 </section>
	<!-- contact section home2 classic-->


<div class="contact-map">
    <iframe 
        src="https://www.google.com/maps?q=904+1st+Ave+Asbury+Park+NJ+07712+USA&output=embed"
        allowfullscreen=""
        loading="lazy">
    </iframe>
</div>

<style>.contact-map {
    width: 100%;
    margin-top: 40px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.contact-map iframe {
    width: 100%;
    height: 400px;
    border: 0;
    display: block;
}</style>

    <!--brand area one-->

	<!--brand area one-->


{% endblock %}
